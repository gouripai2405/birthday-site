<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>For You ❤️</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #ffd1dc, #ffe4e1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
            overflow: hidden;
        }

        h1 {
            color: #ff4d88;
        }

        .cake {
            width: 200px;
            height: 150px;
            background: #ff69b4;
            border-radius: 10px;
            position: relative;
            transition: 0.5s;
        }

        .candle {
            width: 10px;
            height: 40px;
            background: white;
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
        }

        .flame {
            width: 12px;
            height: 12px;
            background: orange;
            border-radius: 50%;
            position: absolute;
            top: 40px;
            left: -1px;
            animation: flicker 0.3s infinite alternate;
        }

        .cake-img {
            width: 220px;
            transition: 0.5s;
        }

        @keyframes flicker {
            from {
                transform: scale(1);
            }

            to {
                transform: scale(1.3);
            }
        }

        /* Balloons */
        .balloon {
            position: absolute;
            bottom: -100px;
            font-size: 30px;
            animation: floatUp 6s linear infinite;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0);
            }

            100% {
                transform: translateY(-120vh);
            }
        }

        /* Confetti */
        .confetti {
            position: absolute;
            width: 8px;
            height: 8px;
            background: pink;
            top: 50%;
            left: 50%;
            animation: burst 1s ease-out forwards;
        }

        @keyframes burst {
            to {
                transform: translate(var(--x), var(--y));
                opacity: 0;
            }
        }

        button {
            margin-top: 30px;
            padding: 12px 25px;
            border-radius: 25px;
            border: none;
            background: #ff4d88;
            color: white;
            cursor: pointer;
        }

        .final-text {
            margin-top: 20px;
            font-size: 1.5rem;
            color: #ff4d88;
            display: none;
        }
    </style>
</head>

<body>
    <audio id="music" src="C:\Users\Gouri\Downloads\HappyBirthdayGF-main\HappyBirthdayGF-main\happy.mpeg"></audio>

    <h1>Make a wish 🎂</h1>

    <img src="C:\Users\Gouri\Downloads\HappyBirthdayGF-main\HappyBirthdayGF-main\cake.jpg" id="cake" class="cake-img">
    <div class="flame" id="flame">🔥</div>

    <button onclick="blow()">Blow Candle 💨</button>

    <div class="final-text" id="finalText">Happy Birthday ❤️✨</div>

    <script>
        function blow() {
            // play music
            document.getElementById("music").play();

            // remove flame
            document.getElementById("flame").style.display = "none";

            // Balloons
            for (let i = 0; i < 15; i++) {
                let b = document.createElement("div");
                b.className = "balloon";
                b.innerText = "🎈";
                b.style.left = Math.random() * 100 + "vw";
                b.style.animationDuration = (Math.random() * 3 + 3) + "s";
                document.body.appendChild(b);
            }

            // Confetti
            for (let i = 0; i < 30; i++) {
                let c = document.createElement("div");
                c.className = "confetti";
                c.style.setProperty("--x", (Math.random() * 400 - 200) + "px");
                c.style.setProperty("--y", (Math.random() * 400 - 200) + "px");
                document.body.appendChild(c);
            }

            // After 2 sec → cake cut effect
            setTimeout(() => {
                document.getElementById("cake").style.transform = "scale(0.9) rotate(-5deg)";
            }, 2000);

            // After 3 sec → final message
            setTimeout(() => {
                document.getElementById("finalText").style.display = "block";
            }, 3000);
        }
    </script>

</body>

</html>
